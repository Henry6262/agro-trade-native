openapi: 3.0.0
info:
  title: Trade Operations API
  version: 1.0.0
  description: API for managing agricultural trade operations

paths:
  /api/buyer/listings/active:
    get:
      summary: Get active buy listings that need fulfillment
      operationId: getActiveBuyListings
      tags: [Buy Listings]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, PENDING]
          default: ACTIVE
        - name: hasTradeOperation
          in: query
          schema:
            type: boolean
          description: Filter by whether listing has trade operation
      responses:
        '200':
          description: List of buy listings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    buyerId:
                      type: string
                    product:
                      type: object
                    quantity:
                      type: number
                    maxPricePerUnit:
                      type: number
                    neededBy:
                      type: string
                      format: date-time
                    deliveryAddress:
                      type: object
                    specifications:
                      type: array
                    hasTradeOperation:
                      type: boolean
                    status:
                      type: string

  /api/trade-operations:
    post:
      summary: Create trade operation from existing buy listing
      operationId: createTradeOperation
      tags: [Trade Operations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [buyListingId]
              properties:
                buyListingId:
                  type: string
                  format: uuid
                  description: The BuyListing to fulfill (contains all requirements)
                notes:
                  type: string
                  description: Admin notes for this operation
      responses:
        '201':
          description: Trade operation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeOperation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      summary: List trade operations
      operationId: listTradeOperations
      tags: [Trade Operations]
      parameters:
        - name: phase
          in: query
          schema:
            $ref: '#/components/schemas/TradePhase'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TradeStatus'
        - name: buyerId
          in: query
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of trade operations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TradeOperation'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /api/trade-operations/{id}/updates:
    get:
      summary: Get recent updates for trade operation
      operationId: getTradeUpdates
      tags: [Trade Operations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Get updates since this timestamp
      responses:
        '200':
          description: Recent updates
          content:
            application/json:
              schema:
                type: object
                properties:
                  updates:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [phase_change, seller_added, offer_update, bid_received, inspection_completed]
                        timestamp:
                          type: string
                          format: date-time
                        data:
                          type: object
                  lastChecked:
                    type: string
                    format: date-time

  /api/trade-operations/{id}:
    get:
      summary: Get trade operation details
      operationId: getTradeOperation
      tags: [Trade Operations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Trade operation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeOperationDetails'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update trade operation
      operationId: updateTradeOperation
      tags: [Trade Operations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: '#/components/schemas/TradeStatus'
                targetDelivery:
                  type: string
                  format: date-time
                notes:
                  type: string
      responses:
        '200':
          description: Trade operation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeOperation'

  /api/trade-operations/{id}/phase:
    patch:
      summary: Transition trade phase
      operationId: transitionPhase
      tags: [Trade Operations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [toPhase, reason]
              properties:
                toPhase:
                  $ref: '#/components/schemas/TradePhase'
                reason:
                  type: string
      responses:
        '200':
          description: Phase transitioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeOperation'
        '400':
          description: Invalid phase transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/trade-operations/{id}/sellers:
    post:
      summary: Add sellers to trade
      operationId: addSellers
      tags: [Trade Operations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sellers]
              properties:
                sellers:
                  type: array
                  items:
                    type: object
                    required: [sellerId, quantity]
                    properties:
                      sellerId:
                        type: string
                        format: uuid
                      saleListingId:
                        type: string
                        format: uuid
                      quantity:
                        type: number
                      unit:
                        type: string
                        enum: [TON, KG, LITER, PIECE]
      responses:
        '201':
          description: Sellers added
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TradeSeller'

    get:
      summary: List trade sellers
      operationId: listTradeSellers
      tags: [Trade Operations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of sellers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TradeSeller'

  /api/negotiations/{negotiationId}/offers:
    post:
      summary: Send offer in negotiation
      operationId: sendOffer
      tags: [Negotiations]
      parameters:
        - name: negotiationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [price, quantity]
              properties:
                price:
                  type: number
                  minimum: 0
                quantity:
                  type: number
                  minimum: 0
                terms:
                  type: string
      responses:
        '201':
          description: Offer sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferRound'

  /api/negotiations/{negotiationId}/respond:
    post:
      summary: Respond to offer
      operationId: respondToOffer
      tags: [Negotiations]
      parameters:
        - name: negotiationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [response]
              properties:
                response:
                  type: string
                  enum: [ACCEPTED, REJECTED, COUNTERED]
                counterPrice:
                  type: number
                counterQuantity:
                  type: number
                responseNote:
                  type: string
      responses:
        '200':
          description: Response recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferRound'

  /api/inspections:
    post:
      summary: Request inspection
      operationId: requestInspection
      tags: [Inspections]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [saleListingId, priority, latitude, longitude]
              properties:
                tradeOperationId:
                  type: string
                  format: uuid
                saleListingId:
                  type: string
                  format: uuid
                priority:
                  $ref: '#/components/schemas/InspectionPriority'
                requestedDate:
                  type: string
                  format: date-time
                latitude:
                  type: number
                longitude:
                  type: number
                address:
                  type: string
      responses:
        '201':
          description: Inspection requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectionRequest'

  /api/transport-bids:
    post:
      summary: Submit transport bid
      operationId: submitTransportBid
      tags: [Transport]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tradeOperationId, bidAmount, estimatedDuration, vehicleType, vehicleCapacity]
              properties:
                tradeOperationId:
                  type: string
                  format: uuid
                bidAmount:
                  type: number
                  minimum: 0
                estimatedDuration:
                  type: integer
                  minimum: 1
                vehicleType:
                  $ref: '#/components/schemas/TruckType'
                vehicleCapacity:
                  type: number
                specialEquipment:
                  type: array
                  items:
                    type: string
                insuranceCoverage:
                  type: number
      responses:
        '201':
          description: Bid submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransportBid'

  /api/sellers/match/{buyListingId}:
    get:
      summary: Find sellers matching buy listing requirements
      operationId: findMatchingSellers
      tags: [Sellers]
      parameters:
        - name: buyListingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: BuyListing to match sellers against
        - name: radius
          in: query
          schema:
            type: number
            default: 50
            description: Search radius in kilometers
        - name: verifiedOnly
          in: query
          schema:
            type: boolean
            default: false
          description: Only show verified sellers
        - name: minMatchScore
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 100
            default: 50
          description: Minimum match score (0-100)
      responses:
        '200':
          description: Matching sellers with scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SellerMatch'

components:
  schemas:
    TradeOperation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        operationNumber:
          type: string
        adminId:
          type: string
          format: uuid
        buyerId:
          type: string
          format: uuid
        phase:
          $ref: '#/components/schemas/TradePhase'
        status:
          $ref: '#/components/schemas/TradeStatus'
        totalValue:
          type: number
        currency:
          type: string
        targetDelivery:
          type: string
          format: date-time
        initiatedAt:
          type: string
          format: date-time

    TradeOperationDetails:
      allOf:
        - $ref: '#/components/schemas/TradeOperation'
        - type: object
          properties:
            sellers:
              type: array
              items:
                $ref: '#/components/schemas/TradeSeller'
            transporters:
              type: array
              items:
                $ref: '#/components/schemas/TradeTransporter'
            negotiations:
              type: array
              items:
                $ref: '#/components/schemas/OfferNegotiation'
            stateHistory:
              type: array
              items:
                $ref: '#/components/schemas/TradeStateHistory'

    TradeSeller:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sellerId:
          type: string
          format: uuid
        quantity:
          type: number
        unit:
          type: string
        agreedPrice:
          type: number
        isVerified:
          type: boolean
        status:
          $ref: '#/components/schemas/SellerStatus'

    TradeTransporter:
      type: object
      properties:
        id:
          type: string
          format: uuid
        transporterId:
          type: string
          format: uuid
        estimatedDistance:
          type: number
        agreedPrice:
          type: number
        status:
          $ref: '#/components/schemas/TransporterStatus'

    OfferNegotiation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        buyerId:
          type: string
          format: uuid
        sellerId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/NegotiationStatus'
        currentOffer:
          type: number
        finalPrice:
          type: number

    OfferRound:
      type: object
      properties:
        id:
          type: string
          format: uuid
        roundNumber:
          type: integer
        offeredBy:
          $ref: '#/components/schemas/OfferParty'
        price:
          type: number
        quantity:
          type: number
        response:
          $ref: '#/components/schemas/OfferResponse'

    InspectionRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        saleListingId:
          type: string
          format: uuid
        priority:
          $ref: '#/components/schemas/InspectionPriority'
        status:
          $ref: '#/components/schemas/InspectionStatus'
        scheduledDate:
          type: string
          format: date-time

    TransportBid:
      type: object
      properties:
        id:
          type: string
          format: uuid
        transporterId:
          type: string
          format: uuid
        bidAmount:
          type: number
        estimatedDuration:
          type: integer
        status:
          $ref: '#/components/schemas/BidStatus'

    SellerMatch:
      type: object
      properties:
        saleListingId:
          type: string
          format: uuid
        sellerId:
          type: string
          format: uuid
        sellerName:
          type: string
        productId:
          type: string
          format: uuid
        latitude:
          type: number
        longitude:
          type: number
        distance:
          type: number
          description: Distance in kilometers
        availableQuantity:
          type: number
        askingPrice:
          type: number
        isVerified:
          type: boolean
        matchScore:
          type: integer
          description: Overall match score (0-100)
        matchBreakdown:
          type: object
          properties:
            distanceScore:
              type: integer
            verificationScore:
              type: integer
            priceScore:
              type: integer
            quantityScore:
              type: integer
            specificationScore:
              type: integer
        specifications:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: any
              matches:
                type: boolean

    TradeStateHistory:
      type: object
      properties:
        fromPhase:
          $ref: '#/components/schemas/TradePhase'
        toPhase:
          $ref: '#/components/schemas/TradePhase'
        changedBy:
          type: string
          format: uuid
        changedAt:
          type: string
          format: date-time
        reason:
          type: string

    TradePhase:
      type: string
      enum:
        - INITIATION
        - SELLER_MATCHING
        - SELLER_NEGOTIATION
        - INSPECTION_PENDING
        - TRANSPORT_MATCHING
        - TRANSPORT_BIDDING
        - IN_TRANSIT
        - DELIVERED
        - COMPLETED
        - CANCELLED

    TradeStatus:
      type: string
      enum:
        - ACTIVE
        - ON_HOLD
        - COMPLETED
        - CANCELLED
        - DISPUTED

    SellerStatus:
      type: string
      enum:
        - INVITED
        - NEGOTIATING
        - ACCEPTED
        - REJECTED
        - CONFIRMED
        - WITHDRAWN

    TransporterStatus:
      type: string
      enum:
        - INVITED
        - BIDDING
        - SELECTED
        - CONFIRMED
        - IN_TRANSIT
        - DELIVERED
        - CANCELLED

    NegotiationStatus:
      type: string
      enum:
        - ACTIVE
        - AGREED
        - FAILED
        - EXPIRED

    OfferParty:
      type: string
      enum:
        - BUYER
        - SELLER
        - PLATFORM

    OfferResponse:
      type: string
      enum:
        - ACCEPTED
        - REJECTED
        - COUNTERED

    InspectionPriority:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
        - URGENT

    InspectionStatus:
      type: string
      enum:
        - PENDING
        - SCHEDULED
        - IN_PROGRESS
        - COMPLETED
        - CANCELLED

    BidStatus:
      type: string
      enum:
        - PENDING
        - ACCEPTED
        - REJECTED
        - EXPIRED
        - WITHDRAWN

    TruckType:
      type: string
      enum:
        - FLATBED
        - REFRIGERATED
        - TANKER
        - CONTAINER
        - CURTAIN_SIDE
        - BOX_TRUCK
        - OTHER

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'