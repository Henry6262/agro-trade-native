openapi: 3.0.0
info:
  title: Trade Operation Detail API
  description: Enhanced endpoints for trade operation management
  version: 1.0.0

paths:
  /api/trade-operations/{id}/detail:
    get:
      summary: Get complete trade operation details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Full trade operation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeOperationDetail'

  /api/trade-operations/{id}/phase:
    patch:
      summary: Update trade operation phase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phase
              properties:
                phase:
                  type: string
                  enum: [SELLER_MATCHING, SELLER_NEGOTIATION, INSPECTION_PENDING, TRANSPORT_MATCHING, TRANSPORT_BIDDING, IN_TRANSIT, DELIVERED, COMPLETED, CANCELLED]
                reason:
                  type: string
                  description: Reason for phase change
      responses:
        '200':
          description: Phase updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  previousPhase:
                    type: string
                  newPhase:
                    type: string

  /api/trade-operations/{id}/actions:
    get:
      summary: Get available actions for current phase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Available actions
          content:
            application/json:
              schema:
                type: object
                properties:
                  actions:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        label:
                          type: string
                        enabled:
                          type: boolean
                        deadline:
                          type: string
                          format: date-time
                          nullable: true

components:
  schemas:
    TradeOperationDetail:
      type: object
      properties:
        id:
          type: string
        operationNumber:
          type: string
        phase:
          type: string
        status:
          type: string
        buyer:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            product:
              type: string
            quantity:
              type: number
            maxPrice:
              type: number
            specifications:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  value:
                    type: string
            location:
              type: object
              properties:
                latitude:
                  type: number
                longitude:
                  type: number
                address:
                  type: string
        sellers:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              status:
                type: string
              quantity:
                type: number
              agreedPrice:
                type: number
                nullable: true
              location:
                type: object
                properties:
                  latitude:
                    type: number
                  longitude:
                    type: number
                  city:
                    type: string
              negotiation:
                type: object
                nullable: true
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  currentOffer:
                    type: number
                  rounds:
                    type: integer
                  lastUpdate:
                    type: string
                    format: date-time
        transporters:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              status:
                type: string
              bid:
                type: number
                nullable: true
              estimatedDelivery:
                type: string
                format: date-time
                nullable: true
        timeline:
          type: array
          items:
            type: object
            properties:
              phase:
                type: string
              timestamp:
                type: string
                format: date-time
              description:
                type: string
              actor:
                type: string
        profitEstimate:
          type: object
          properties:
            revenue:
              type: number
            costs:
              type: number
            profit:
              type: number
            margin:
              type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time