openapi: 3.0.0
info:
  title: Location Data API
  description: Enhanced location endpoints for trade operations
  version: 1.0.0

paths:
  /api/sellers/update-locations:
    post:
      summary: Bulk update seller locations
      description: Add missing location data to sale listings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                updates:
                  type: array
                  items:
                    type: object
                    properties:
                      saleListingId:
                        type: string
                      latitude:
                        type: number
                        minimum: -90
                        maximum: 90
                      longitude:
                        type: number
                        minimum: -180
                        maximum: 180
                      city:
                        type: string
                      address:
                        type: string
      responses:
        '200':
          description: Locations updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                  failed:
                    type: integer

  /api/trade-operations/{id}/sellers-with-locations:
    get:
      summary: Get sellers with full location data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sellers with location data
          content:
            application/json:
              schema:
                type: object
                properties:
                  sellers:
                    type: array
                    items:
                      type: object
                      properties:
                        sellerId:
                          type: string
                        sellerName:
                          type: string
                        saleListingId:
                          type: string
                        location:
                          type: object
                          properties:
                            latitude:
                              type: number
                            longitude:
                              type: number
                            city:
                              type: string
                            address:
                              type: string
                            displayName:
                              type: string
                        availability:
                          type: number
                        askingPrice:
                          type: number
                        matchScore:
                          type: integer