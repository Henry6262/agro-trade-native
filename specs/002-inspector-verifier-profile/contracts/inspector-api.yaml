openapi: 3.0.0
info:
  title: Inspector/Verifier API
  version: 1.0.0
  description: API endpoints for inspector profile and verification jobs

paths:
  /api/inspector/jobs:
    get:
      summary: List available verification jobs
      tags:
        - Inspector
      parameters:
        - name: priority
          in: query
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH]
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, ASSIGNED, IN_PROGRESS, COMPLETED, FAILED, CANCELLED]
        - name: lat
          in: query
          schema:
            type: number
        - name: lng
          in: query
          schema:
            type: number
        - name: radius
          in: query
          schema:
            type: number
          description: Radius in km
      responses:
        '200':
          description: List of verification jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VerificationJob'

  /api/inspector/jobs/{id}:
    get:
      summary: Get specific job details
      tags:
        - Inspector
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/VerificationJob'
        '404':
          description: Job not found

  /api/inspector/jobs/{id}/accept:
    post:
      summary: Accept a verification job
      tags:
        - Inspector
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                inspectorId:
                  type: string
                estimatedArrival:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Job accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/VerificationJob'
        '409':
          description: Job already assigned

  /api/inspector/jobs/{id}/complete:
    post:
      summary: Submit verification results
      tags:
        - Inspector
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationResult'
      responses:
        '200':
          description: Verification completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/VerificationResult'

  /api/inspector/location:
    post:
      summary: Update inspector location
      tags:
        - Inspector
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationUpdate'
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/inspector/profile:
    get:
      summary: Get inspector profile
      tags:
        - Inspector
      responses:
        '200':
          description: Inspector profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/InspectorProfile'

components:
  schemas:
    VerificationJob:
      type: object
      properties:
        id:
          type: string
        sellerListingId:
          type: string
        inspectorId:
          type: string
          nullable: true
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        status:
          type: string
          enum: [PENDING, ASSIGNED, IN_PROGRESS, COMPLETED, FAILED, CANCELLED]
        location:
          type: object
          properties:
            latitude:
              type: number
            longitude:
              type: number
            address:
              type: string
            city:
              type: string
            region:
              type: string
        productDetails:
          type: object
          properties:
            name:
              type: string
            type:
              type: string
            quantity:
              type: number
            unit:
              type: string
            claimedSpecs:
              type: object
        estimatedDuration:
          type: number
        distance:
          type: number
        scheduledDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InspectorProfile:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        employeeId:
          type: string
        specializations:
          type: array
          items:
            type: string
        certifications:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              issuedBy:
                type: string
              validUntil:
                type: string
                format: date
        activeJobId:
          type: string
          nullable: true
        isAvailable:
          type: boolean
        workingHours:
          type: object
          properties:
            start:
              type: string
            end:
              type: string
            workDays:
              type: array
              items:
                type: number
        totalJobsCompleted:
          type: number
        averageRating:
          type: number

    LocationUpdate:
      type: object
      properties:
        inspectorId:
          type: string
        jobId:
          type: string
          nullable: true
        coordinates:
          type: object
          properties:
            latitude:
              type: number
            longitude:
              type: number
            accuracy:
              type: number
            heading:
              type: number
            speed:
              type: number
        timestamp:
          type: string
          format: date-time
        batteryLevel:
          type: number
        networkType:
          type: string
          enum: [wifi, cellular, none]
        isMoving:
          type: boolean

    VerificationResult:
      type: object
      properties:
        jobId:
          type: string
        inspectorId:
          type: string
        originalSpecs:
          type: object
        verifiedSpecs:
          type: object
        testMethods:
          type: array
          items:
            type: object
            properties:
              parameter:
                type: string
              method:
                type: string
              equipment:
                type: string
              standardUsed:
                type: string
        evidence:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [photo, document, video]
              url:
                type: string
              caption:
                type: string
              timestamp:
                type: string
                format: date-time
        notes:
          type: string
        verificationStatus:
          type: string
          enum: [VERIFIED, PARTIALLY_VERIFIED, FAILED, PENDING_REVIEW]
        signature:
          type: string
        verifiedAt:
          type: string
          format: date-time