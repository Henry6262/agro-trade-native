openapi: 3.0.0
info:
  title: Trade Operations Management API
  version: 1.0.0
  description: API for managing trade operations and negotiations

paths:
  /api/trade-operations:
    get:
      summary: List active trade operations
      tags: [Trade Operations]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, COMPLETED, CANCELLED]
          required: false
        - name: phase
          in: query
          schema:
            type: string
            enum: [INITIATION, SELLER_NEGOTIATION, TRANSPORT_BIDDING, INSPECTION, IN_TRANSIT, DELIVERED, COMPLETED]
          required: false
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        200:
          description: List of trade operations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TradeOperationSummary'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  /api/trade-operations/{id}/negotiations:
    get:
      summary: Get negotiations for a trade operation
      tags: [Negotiations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, ACCEPTED, REJECTED, COUNTERED, EXPIRED]
      responses:
        200:
          description: Negotiations detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  operation:
                    $ref: '#/components/schemas/TradeOperationDetail'
                  negotiations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Negotiation'
                  potentialSellers:
                    type: array
                    items:
                      $ref: '#/components/schemas/PotentialSeller'
        404:
          description: Trade operation not found

  /api/trade-operations/{id}/add-sellers:
    post:
      summary: Add potential sellers to trade operation
      tags: [Trade Operations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sellers:
                  type: array
                  items:
                    type: object
                    properties:
                      sellerId:
                        type: string
                      saleListingId:
                        type: string
                      offerPrice:
                        type: number
                      requestedQuantity:
                        type: number
                      terms:
                        type: string
      responses:
        201:
          description: Sellers added and negotiations created
          content:
            application/json:
              schema:
                type: object
                properties:
                  added:
                    type: integer
                  negotiations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Negotiation'
        400:
          description: Invalid request (e.g., exceeds quantity needed)

  /api/negotiations/{id}/counter-offer:
    post:
      summary: Respond to a counter-offer
      tags: [Negotiations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [ACCEPT, REJECT, COUNTER]
                counterOffer:
                  type: object
                  required: false
                  properties:
                    price:
                      type: number
                    quantity:
                      type: number
                    terms:
                      type: string
      responses:
        200:
          description: Counter-offer response recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Negotiation'
        400:
          description: Invalid action or negotiation state

  /api/negotiations/{id}/accept:
    post:
      summary: Accept a negotiation offer
      tags: [Negotiations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Offer accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Negotiation'

  /api/negotiations/{id}/reject:
    post:
      summary: Reject a negotiation offer
      tags: [Negotiations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        200:
          description: Offer rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Negotiation'

components:
  schemas:
    TradeOperationSummary:
      type: object
      properties:
        id:
          type: string
        operationNumber:
          type: string
        phase:
          type: string
        status:
          type: string
        product:
          type: object
          properties:
            name:
              type: string
            category:
              type: string
        buyer:
          type: object
          properties:
            name:
              type: string
            company:
              type: string
        negotiationProgress:
          type: number
          description: Percentage of quantity secured
        activeNegotiations:
          type: integer
        totalNegotiations:
          type: integer
        profitMargin:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TradeOperationDetail:
      allOf:
        - $ref: '#/components/schemas/TradeOperationSummary'
        - type: object
          properties:
            totalQuantityNeeded:
              type: number
            totalQuantitySecured:
              type: number
            targetPrice:
              type: number
            canProceed:
              type: boolean

    Negotiation:
      type: object
      properties:
        id:
          type: string
        tradeSellerId:
          type: string
        seller:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            location:
              type: object
        status:
          type: string
          enum: [PENDING, ACCEPTED, REJECTED, COUNTERED, EXPIRED]
        currentOffer:
          type: object
          properties:
            price:
              type: number
            quantity:
              type: number
            terms:
              type: string
        counterOffer:
          type: object
          nullable: true
          properties:
            price:
              type: number
            quantity:
              type: number
            terms:
              type: string
            receivedAt:
              type: string
              format: date-time
        expiresAt:
          type: string
          format: date-time
        timeRemaining:
          type: string
          description: Human-readable time remaining
        createdAt:
          type: string
          format: date-time

    PotentialSeller:
      type: object
      properties:
        sellerId:
          type: string
        sellerName:
          type: string
        saleListingId:
          type: string
        availableQuantity:
          type: number
        askingPrice:
          type: number
        location:
          type: object
          properties:
            city:
              type: string
            coordinates:
              type: object
        distance:
          type: number
        matchScore:
          type: number

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer