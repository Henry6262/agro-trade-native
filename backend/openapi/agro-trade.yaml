      operationId: BuyerController_getMyBuyListings
      summary: Get buy listings for current user
      parameters: []
      responses:
        "200":
          description: Buyer listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BuyListingResponseDto"
      tags: *a7
      security: *a8
  /buyer/listings/{id}:
    get:
      operationId: BuyerController_getBuyListingById
      summary: Get buy listing by id
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Buy listing detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyListingResponseDto"
      tags: *a7
      security: *a8
    patch:
      operationId: BuyerController_updateBuyListing
      summary: Update buy listing
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBuyListingDto"
      responses:
        "200":
          description: Updated listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyListingResponseDto"
      tags: *a7
      security: *a8
    delete:
      operationId: BuyerController_deleteBuyListing
      summary: Delete buy listing
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Deleted buy listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyListingResponseDto"
