                  additionalProperties: true
      tags: *a5
      security: *a6
  /seller/stats:
    get:
      operationId: SellerController_getMyStats
      summary: Get seller statistics
      parameters: []
      responses:
        "200":
          description: Seller stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerStatsDto"
      tags: *a5
      security: *a6
  /seller/listings/{id}/status:
