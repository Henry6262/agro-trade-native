      responses:
        "200":
          description: Buyer offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BuyerOfferSummaryDto"
      tags: *a7
      security: *a8
  /buyer/trades:
    get:
      operationId: BuyerController_getMyTrades
      summary: Get accepted trade offers for buyer
      parameters: []
      responses:
        "200":
          description: Buyer trades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BuyerOfferSummaryDto"
      tags: *a7
      security: *a8
  /buyer/stats:
    get:
      operationId: BuyerController_getMyStats
      summary: Get buyer statistics
      parameters: []
      responses:
        "200":
          description: Buyer statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyerStatsDto"
      tags: *a7
      security: *a8
  /buyer/listings/{id}/status:
    patch:
      operationId: BuyerController_updateBuyListingStatus
      summary: Update buy listing status
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                    - ACTIVE
                    - FULFILLED
                    - PARTIALLY_FULFILLED
                    - EXPIRED
                    - CANCELLED
              required:
                - status
      responses:
        "200":
          description: Updated listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyListingResponseDto"
      tags: *a7
      security: *a8
  /trade-operations:
    post:
      operationId: TradeOperationController_create
      summary: Create a new trade operation
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTradeOperationDto"
      responses:
        "201":
          description: Trade operation created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeOperationResponseDto"
        "400":
          description: Invalid input data
      tags: &a9
        - Trade Operations
      security: &a10
        - bearer: []
    get:
      operationId: TradeOperationController_findAll
      summary: Get all trade operations with filters
      parameters:
        - name: phase
          required: false
          in: query
          schema:
            enum:
              - INITIATION
              - SELLER_MATCHING
              - SELLER_NEGOTIATION
              - INSPECTION_PENDING
              - TRANSPORT_MATCHING
              - TRANSPORT_BIDDING
              - IN_TRANSIT
              - DELIVERED
              - COMPLETED
              - CANCELLED
            type: string
        - name: status
          required: false
          in: query
          schema:
            enum:
              - ACTIVE
              - ON_HOLD
              - COMPLETED
              - CANCELLED
              - DISPUTED
            type: string
        - name: minProfitMargin
          required: false
          in: query
          schema:
            type: number
        - name: limit
          required: false
          in: query
          schema:
            example: 10
            type: number
        - name: page
          required: false
          in: query
          schema:
            example: 1
            type: number
      responses:
        "200":
          description: List of trade operations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeOperationListResponseDto"
      tags: *a9
      security: *a10
  /trade-operations/analytics:
    get:
      operationId: TradeOperationController_getAnalytics
      summary: Get trade analytics and profit metrics
      parameters:
        - name: startDate
          required: false
          in: query
          schema:
            type: string
        - name: endDate
          required: false
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Trade analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeAnalyticsDto"
      tags: *a9
      security: *a10
  /trade-operations/{id}:
    get:
      operationId: TradeOperationController_findOne
      summary: Get a specific trade operation
      parameters:
        - name: id
          required: true
          in: path
          description: Trade operation ID
          schema:
            type: string
      responses:
        "200":
          description: Trade operation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeOperationResponseDto"
        "404":
          description: Trade operation not found
      tags: *a9
      security: *a10
    put:
      operationId: TradeOperationController_update
      summary: Update a trade operation
      parameters:
        - name: id
          required: true
          in: path
          description: Trade operation ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTradeOperationDto"
      responses:
        "200":
          description: Trade operation updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeOperationResponseDto"
      tags: *a9
      security: *a10
    delete:
      operationId: TradeOperationController_cancel
      summary: Cancel a trade operation
      parameters:
        - name: id
          required: true
          in: path
          description: Trade operation ID
          schema:
            type: string
      responses:
        "204":
          description: Trade operation cancelled
      tags: *a9
      security: *a10
  /trade-operations/{id}/profit:
    get:
      operationId: TradeOperationController_getProfit
      summary: Get profit data for a trade operation
      parameters:
        - name: id
          required: true
          in: path
          description: Trade operation ID
          schema:
            type: string
      responses:
        "200":
          description: Trade operation profit data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeProfitResponseDto"
        "404":
          description: Trade operation not found
      tags: *a9
      security: *a10
  /trade-operations/{id}/phase:
    patch:
      operationId: TradeOperationController_updatePhase
      summary: Update the phase of a trade operation
      parameters:
        - name: id
          required: true
          in: path
          description: Trade operation ID
          schema:
            type: string
      responses:
        "200":
          description: Trade operation phase updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeOperationResponseDto"
        "400":
          description: Invalid phase transition
        "404":
          description: Trade operation not found
      tags: *a9
      security: *a10
  /trade-operations/{id}/sellers:
    post:
      operationId: TradeOperationController_addSellers
      summary: Add sellers to a trade operation
      parameters:
        - name: id
          required: true
          in: path
          description: Trade operation ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSellersDto"
      responses:
        "200":
          description: Sellers added successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddSellersResponseDto"
      tags: *a9
      security: *a10
  /trade-operations/{id}/matching-sellers:
    get:
      operationId: TradeOperationController_findMatchingSellers
      summary: Find matching sellers for a trade operation
      parameters:
        - name: id
          required: true
          in: path
          description: Trade operation ID
          schema:
            type: string
        - name: quality
          required: false
          in: query
          schema:
            enum:
              - PREMIUM
              - STANDARD
              - ECONOMY
              - ANY
            type: string
      responses:
        "200":
          description: List of matching sellers
      tags: *a9
      security: *a10
  /trade-operations/{id}/optimize-transport:
    post:
      operationId: TradeOperationController_optimizeTransport
      summary: Optimize transport route for a trade operation
      parameters:
        - name: id
          required: true
          in: path
          description: Trade operation ID
          schema:
            type: string
      responses:
        "200":
          description: Transport route optimized
      tags: *a9
      security: *a10
  /trade-operations/{id}/finalize:
    post:
      operationId: TradeOperationController_finalize
      summary: Finalize a trade operation
      parameters:
        - name: id
          required: true
          in: path
          description: Trade operation ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinalizeTradeDto"
      responses:
        "200":
          description: Trade operation finalized
        "400":
          description: Cannot finalize trade operation
      tags: *a9
      security: *a10
  /trade-operations/{id}/request-inspections:
    post:
      operationId: TradeOperationController_requestInspections
      summary: Request inspections for selected sellers
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "201":
          description: Inspection requests created
      tags: *a9
      security: *a10
  /profit/{id}/profit:
    get:
      operationId: ProfitController_calculateProfit
      summary: Calculate real-time profit for a trade operation
      parameters:
        - name: id
          required: true
          in: path
          description: Trade operation ID
          schema:
            type: string
        - name: includeSensitivity
          required: false
          in: query
          schema:
            type: boolean
        - name: includeRiskAssessment
          required: false
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Profit calculation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfitCalculationResponseDto"
      tags: &a11
        - Profit Calculations
      security: &a12
        - bearer: []
  /profit/{id}/profit/estimate:
    post:
      operationId: ProfitController_estimateProfit
      summary: Estimate profit with proposed prices
      parameters:
        - name: id
          required: true
          in: path
          description: Trade operation ID
          schema:
            type: string
      responses:
        "200":
          description: Profit estimation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfitEstimationResponseDto"
