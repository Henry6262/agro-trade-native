info:
  title: Agro-Trade API
  description: API documentation for Agro-Trade platform
  version: 0.0.1
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    GoogleMobileAuthDto:
      type: object
      properties:
        code:
          type: string
        redirectUri:
          type: string
        role:
          type: string
      required:
        - code
        - redirectUri
    AuthUserDto:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: object
        phoneNumber:
          type: object
        role:
          type: string
          enum:
            - ADMIN
            - FARMER
            - BUYER
            - TRANSPORTER
            - COMPANY_ADMIN
            - INSPECTOR
        hasProfile:
          type: boolean
      required:
        - id
        - email
        - role
    AuthSuccessResponseDto:
      type: object
      properties:
        success:
          type: boolean
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUserDto"
        message:
          type: string
      required:
        - success
        - access_token
        - refresh_token
        - user
    GoogleNativeUserInfoDto:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        givenName:
          type: string
        familyName:
          type: string
        photo:
          type: string
      required:
        - id
        - email
    GoogleNativeAuthDto:
      type: object
      properties:
        idToken:
          type: string
        role:
          type: string
        userInfo:
          $ref: "#/components/schemas/GoogleNativeUserInfoDto"
      required:
        - idToken
    LoginDto:
      type: object
      properties: {}
    RegisterDto:
      type: object
      properties: {}
    TransporterRegisterDto:
      type: object
      properties: {}
    TransporterRegistrationResponseDto:
      type: object
      properties:
        success:
          type: boolean
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUserDto"
        message:
          type: string
        transporter:
          type: object
      required:
        - success
        - access_token
        - refresh_token
        - user
    RefreshTokenDto:
      type: object
      properties: {}
    RefreshTokenResponseDto:
      type: object
      properties:
        success:
          type: boolean
        access_token:
          type: string
        refresh_token:
          type: string
      required:
        - success
        - access_token
        - refresh_token
    LogoutResponseDto:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message
    AuthProfileResponseDto:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: object
        phoneNumber:
          type: object
        role:
          type: string
          enum:
            - ADMIN
            - FARMER
            - BUYER
            - TRANSPORTER
            - COMPANY_ADMIN
            - INSPECTOR
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        companyContext:
          type: object
      required:
        - id
        - email
        - role
        - createdAt
        - updatedAt
    SellerOnboardingDto:
      type: object
      properties: {}
    OnboardingUserResponseDto:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: object
        phoneNumber:
          type: object
        role:
          type: string
          enum:
            - ADMIN
            - FARMER
            - BUYER
            - TRANSPORTER
            - COMPANY_ADMIN
            - INSPECTOR
        onboardingCompleted:
          type: boolean
      required:
        - id
        - email
        - role
        - onboardingCompleted
    BuyerOnboardingDto:
      type: object
      properties: {}
    TransporterOnboardingDto:
      type: object
      properties: {}
    OnboardingCompanyDto:
      type: object
      properties:
        id:
          type: string
        legalName:
          type: object
        registrationNumber:
          type: object
        vatNumber:
          type: object
        phoneNumber:
          type: object
        email:
          type: object
        website:
          type: object
      required:
        - id
    OnboardingAddressDto:
      type: object
      properties:
        id:
          type: string
        addressType:
          type: string
          enum:
            - BILLING
            - SHIPPING
            - FARM
            - WAREHOUSE
            - OFFICE
            - PICKUP
            - DELIVERY
            - OTHER
        label:
          type: object
        street:
          type: object
        cityId:
          type: object
        postalCode:
          type: object
        country:
          type: object
        latitude:
          type: number
        longitude:
          type: number
        isDefault:
          type: object
      required:
        - id
        - addressType
    OnboardingTruckDto:
      type: object
      properties:
        id:
          type: string
        plateNumber:
          type: string
        capacity:
          type: number
        type:
          type: string
          enum:
            - FLATBED
            - REFRIGERATED
            - TANKER
            - CONTAINER
            - CURTAIN_SIDE
            - BOX_TRUCK
            - OTHER
        currentLocation:
          type: object
        latitude:
          type: number
        longitude:
          type: number
        isAvailable:
          type: boolean
      required:
        - id
        - plateNumber
        - type
        - isAvailable
    OnboardingDataDto:
      type: object
      properties:
        company:
          $ref: "#/components/schemas/OnboardingCompanyDto"
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/OnboardingAddressDto"
        trucks:
          type: array
          items:
            $ref: "#/components/schemas/OnboardingTruckDto"
    OnboardingStatusResponseDto:
      type: object
      properties:
        userId:
          type: string
        role:
          type: string
          enum:
            - ADMIN
            - FARMER
            - BUYER
            - TRANSPORTER
            - COMPANY_ADMIN
            - INSPECTOR
        isComplete:
          type: boolean
        onboardingCompleted:
          type: boolean
        missingFields:
          type: array
          items:
            type: string
        data:
          $ref: "#/components/schemas/OnboardingDataDto"
      required:
        - userId
        - role
        - isComplete
        - onboardingCompleted
        - missingFields
        - data
    CreateListingDto:
      type: object
      properties: {}
    SellerProductSummaryDto:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: object
        description:
          type: object
      required:
        - id
        - name
    SellerAddressDto:
      type: object
      properties:
        id:
          type: string
        street:
          type: object
        city:
          type: object
        country:
          type: object
        latitude:
          type: number
        longitude:
          type: number
