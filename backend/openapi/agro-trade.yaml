          required: true
          in: path
          description: Trade operation ID
          schema:
            type: string
      responses:
        "200":
          description: Profit comparison
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfitComparisonDto"
      tags: *a11
      security: *a12
