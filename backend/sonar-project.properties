# SonarCloud — Backend
sonar.projectKey=Henry6262_agro-trade-native_backend
sonar.projectName=agro-trade-native :: backend
sonar.organization=henry6262

# Source & tests
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.d.ts

# Coverage
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/migrations/**,**/seeds/**

# Quality gate
sonar.qualitygate.wait=true

# Encoding
sonar.sourceEncoding=UTF-8
