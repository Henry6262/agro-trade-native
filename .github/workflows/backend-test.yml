name: Backend Unit & Regression Tests

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'backend/**'
  push:
    branches: [main, dev]
    paths:
      - 'backend/**'

jobs:
  test:
    name: Run Backend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit & regression tests
        run: npm test -- --ci --coverage --forceExit
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          JWT_SECRET: "ci-test-secret-key"
          NODE_ENV: "test"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node${{ matrix.node-version }}
          path: backend/coverage/
          retention-days: 14

  smoke:
    name: Smoke Test (Server starts & /health responds)
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Start server in background
        run: |
          npm run start &
          echo $! > /tmp/server.pid
          sleep 4
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          JWT_SECRET: "ci-test-secret-key"
          NODE_ENV: "test"
          PORT: "3000"

      - name: Check /health endpoint
        run: |
          curl --retry 5 --retry-delay 2 --fail http://localhost:3000/health
          echo "✅ Smoke test passed"

      - name: Stop server
        if: always()
        run: kill $(cat /tmp/server.pid) || true
