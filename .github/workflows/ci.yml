name: CI – Multi-Surface Lint, TypeCheck & Contract Build

# ── Trigger guards ──────────────────────────────────────────────────────────
# Push only on main/develop to avoid double-runs on every feature branch push.
# PRs still run on all branches for full coverage.
on:
  push:
    branches: [main, develop]
  pull_request:

# ── Concurrency guard ───────────────────────────────────────────────────────
# Cancel any previous run for the same workflow+ref so stale runs don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # 1. Front-end: lint + TypeScript strict check
  # ─────────────────────────────────────────
  lint-typecheck-frontend:
    name: Lint & TypeCheck – Front-end
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: front-end
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Guard – lint script exists
        run: npm run | grep -q 'lint' || (echo "::error::No lint script found in front-end/package.json" && exit 1)

      - name: Lint
        run: npm run lint

      - name: TypeScript strict check
        run: npm run type-check

  # ─────────────────────────────────────────
  # 2. Backend: lint + TypeScript strict check
  # ─────────────────────────────────────────
  lint-typecheck-backend:
    name: Lint & TypeCheck – Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Guard – lint script exists
        run: npm run | grep -q 'lint' || (echo "::error::No lint script found in backend/package.json" && exit 1)

      - name: Lint
        run: npm run lint

      - name: TypeScript strict check
        run: npm run tsc

  # ─────────────────────────────────────────
  # 3. EVM contracts: Foundry build + tests
  # ─────────────────────────────────────────
  # NOTE: `submodules: recursive` requires ALL entries in .gitmodules to have
  # a valid `url`. If the checkout fails with "no url found for submodule",
  # either add the missing url to .gitmodules OR switch to `submodules: false`
  # below (Foundry will still build — it just won't clone lib/ submodules).
  typecheck-evm-contracts:
    name: Build – EVM Contracts (Foundry)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cache Foundry build
        uses: actions/cache@v4
        with:
          path: contracts/cache
          key: ${{ runner.os }}-foundry-${{ hashFiles('contracts/**/*.sol') }}
          restore-keys: |
            ${{ runner.os }}-foundry-

      - name: Verify forge
        run: forge --version

      - name: Build contracts
        run: forge build --sizes

      - name: Run tests
        run: forge test

  # ─────────────────────────────────────────
  # 4. Solana contracts: Anchor build
  # ─────────────────────────────────────────
  typecheck-solana-contracts:
    name: TypeCheck – Solana Contracts (Anchor)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: contracts-solana
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust / Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            ~/.rustup
          key: ${{ runner.os }}-cargo-anchor-v0.30.1-${{ hashFiles('contracts-solana/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-anchor-v0.30.1-
            ${{ runner.os }}-cargo-

      - name: Cache Solana CLI
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana/install/active_release
          key: ${{ runner.os }}-solana-stable

      - name: Install Solana CLI (skip if cached)
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI (skip if cached)
        # NOTE: --locked is intentionally omitted – it causes failures when any
        # transitive crate has been yanked from crates.io since the lockfile was
        # generated.  Omitting it lets Cargo resolve to the nearest compatible
        # non-yanked versions while still pinning the anchor-cli tag to v0.30.1.
        run: |
          if ! command -v anchor &> /dev/null; then
            cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli
          else
            echo "Anchor CLI already cached: $(anchor --version)"
          fi

      - name: Set up Node.js (for Anchor JS deps)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts-solana/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Anchor build
        run: anchor build

      - name: Anchor test
        run: anchor test --skip-local-validator
