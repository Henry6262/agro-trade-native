name: Monorepo CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      contracts: ${{ steps.filter.outputs.contracts }}
      contracts-solana: ${{ steps.filter.outputs.contracts-solana }}
      admin: ${{ steps.filter.outputs.admin }}
      landing: ${{ steps.filter.outputs.landing }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'tsconfig.base.json'
            frontend:
              - 'front-end/**'
              - 'tsconfig.base.json'
            contracts:
              - 'contracts/**'
              - 'tsconfig.base.json'
            contracts-solana:
              - 'contracts-solana/**'
              - 'tsconfig.base.json'
            admin:
              - 'admin-dashboard/**'
            landing:
              - 'landing/**'

  # ─────────────────────────────────────────────────────────────────────────────
  global-checks:
    name: Typecheck + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --ignore-scripts
      - name: Prettier format check
        run: npx prettier --check "**/*.{ts,tsx,js,json,md,yml}" --ignore-path .prettierignore
      - name: Root tsconfig sanity
        run: npx tsc --noEmit -p tsconfig.base.json || true

  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Test & Typecheck
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Unit & regression tests
        run: npm test -- --ci --coverage --forceExit
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          JWT_SECRET: ci-test-secret-key
          NODE_ENV: test
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-node${{ matrix.node-version }}
          path: backend/coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Front-end — Build & Typecheck
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front-end
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  contracts-evm:
    name: Contracts EVM — Compile & Test
    needs: detect-changes
    if: needs.detect-changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - name: Cache Foundry binaries
        uses: actions/cache@v4
        with:
          path: ~/.foundry
          key: foundry-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml') }}
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Compile contracts
        run: npx hardhat compile || forge build
      - name: Run tests
        run: npx hardhat test || forge test -vvv

  # ─────────────────────────────────────────────────────────────────────────────
  contracts-solana:
    name: Contracts Solana — Build & Test
    needs: detect-changes
    if: needs.detect-changes.outputs.contracts-solana == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts-solana
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts-solana/package-lock.json
      - name: Cache Solana toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/solana
            ~/.cargo
          key: solana-${{ runner.os }}-v1.18
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.26/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Build Anchor programs
        run: anchor build
      - name: Run Anchor tests
        run: anchor test --skip-local-validator

  # ─────────────────────────────────────────────────────────────────────────────
  admin-dashboard:
    name: Admin Dashboard — Build
    needs: detect-changes
    if: needs.detect-changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./admin-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-dashboard/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build

  landing:
    name: Landing Page — Build
    needs: detect-changes
    if: needs.detect-changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landing/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  # Required status check gate — always runs, aggregates all parallel jobs
  ci-success:
    name: CI ✅ All checks passed
    runs-on: ubuntu-latest
    needs:
      - global-checks
      - backend
      - frontend
      - contracts-evm
      - contracts-solana
      - admin-dashboard
      - landing
    if: always()
    steps:
      - name: Evaluate results
        run: |
          results='${{ toJson(needs) }}'
          failures=$(echo "$results" | python3 -c "
import sys, json
d = json.load(sys.stdin)
failed = [k for k,v in d.items() if v.get('result') not in ('success','skipped')]
if failed: print('FAILED: ' + ', '.join(failed))
sys.exit(len(failed))
")
          echo "All required checks passed ✅"
