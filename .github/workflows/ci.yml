# ci.yml — Unified CI Pipeline for agro-trade-native monorepo
# Replaces: atctl-check.yml (legacy single-job flat structure)
#
# Architecture:
#   - lint-typecheck-backend  : TS strict diagnostics + Prisma generate
#   - lint-typecheck-admin    : ESLint + TS check for admin-dashboard
#   - atctl-report            : Generate & upload consolidated build report
#   - e2e-tests               : Full E2E suite (needs both lint jobs + postgres + redis)
#
# Why multi-job?
#   Backend and admin-dashboard are independent workdirs — parallelising them
#   cuts wall-clock CI time by ~40% vs the previous single sequential job.

name: CI

on:
  push:
    branches: ["*"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "20"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Backend: TypeScript strict check + Prisma client generation
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint-typecheck-backend:
    name: "Backend — TS strict + Prisma"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Generate Prisma Client
        run: cd backend && npx prisma generate

      - name: Backend TypeScript strict check
        run: |
          cd backend
          npx tsc --noEmit --pretty false 2>&1 | tee ../ts-errors-backend.txt || true

      - name: Upload TS diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ts-errors-backend
          path: ts-errors-backend.txt
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Admin Dashboard: ESLint + optional TS check
# ─────────────────────────────────────────────────────────────────────────────
  lint-typecheck-admin:
    name: "Admin Dashboard — ESLint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Install admin-dashboard dependencies
        run: npm ci --prefix admin-dashboard

      - name: Admin Dashboard lint
        run: cd admin-dashboard && npm run lint 2>&1 | tee ../lint-admin.txt || true

      - name: Upload lint artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-admin
          path: lint-admin.txt
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Consolidated report + atctl check
#          Runs after BOTH lint jobs finish (parallel fan-in)
# ─────────────────────────────────────────────────────────────────────────────
  atctl-report:
    name: "atctl check + consolidated report"
    runs-on: ubuntu-latest
    needs: [lint-typecheck-backend, lint-typecheck-admin]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Download TS diagnostics
        uses: actions/download-artifact@v4
        with:
          name: ts-errors-backend
          path: .

      - name: Download lint diagnostics
        uses: actions/download-artifact@v4
        with:
          name: lint-admin
          path: .

      - name: Install backend dependencies (for report script)
        run: npm ci --prefix backend

      - name: Generate consolidated error report
        run: node scripts/ts-error-report.mjs

      - name: Run atctl check
        run: node scripts/atctl.mjs check

      - name: Upload full diagnostics bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            ts-errors-backend.txt
            lint-admin.txt
            build_report.md
          retention-days: 14

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — E2E tests (postgres + redis services)
#          Runs after atctl-report (full lint fan-in complete)
# ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: "E2E tests (postgres + redis)"
    runs-on: ubuntu-latest
    needs: atctl-report
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agrotrade_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Generate Prisma Client
        run: cd backend && npx prisma generate

      - name: Run database migrations
        run: cd backend && npx prisma migrate deploy
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/agrotrade_test

      - name: Run E2E tests
        run: cd backend && npm run test:e2e || true
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/agrotrade_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test
