name: atctl-check

on:
  push:
    branches: ["*"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            admin-dashboard/package-lock.json
      - name: Install dependencies
        run: |
          npm install --prefix backend
          npm install --prefix admin-dashboard
      - name: Generate Prisma Client
        run: cd backend && npx prisma generate
      - name: Backend TypeScript check (diagnostics)
        run: |
          cd backend
          npx tsc --noEmit --pretty false 2>&1 | tee ../ts-errors-backend.txt || true
      - name: Admin Dashboard lint
        run: cd admin-dashboard && npm run lint 2>&1 | tee ../lint-admin.txt || true
      - name: Generate error report
        if: always()
        run: node scripts/ts-error-report.mjs
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-diagnostics
          path: |
            ts-errors-backend.txt
            lint-admin.txt
            build_report.md
      - name: Run atctl check
        run: node scripts/atctl.mjs check

  e2e-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agrotrade_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        run: npm install --prefix backend
      - name: Generate Prisma Client
        run: cd backend && npx prisma generate
      - name: Run database migrations
        run: cd backend && npx prisma migrate deploy
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/agrotrade_test
      - name: Run E2E tests
        run: cd backend && npm run test:e2e || true
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/agrotrade_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test
