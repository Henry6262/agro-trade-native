version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend

  - package-ecosystem: npm
    directory: /admin-dashboard
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - admin-dashboard

  - package-ecosystem: npm
    directory: /front-end
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - mobile

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
