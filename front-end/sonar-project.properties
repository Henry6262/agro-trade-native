# SonarCloud — Frontend
sonar.projectKey=Henry6262_agro-trade-native_frontend
sonar.projectName=agro-trade-native :: frontend
sonar.organization=henry6262

# Source & tests
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/*.d.ts,**/public/**

# Coverage
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/pages/_app*,**/pages/_document*

# Quality gate
sonar.qualitygate.wait=true

# Encoding
sonar.sourceEncoding=UTF-8
